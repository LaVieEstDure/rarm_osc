[workspace]
authors = ["Raghav Mishra <raghav.mishra@sydney.edu.au>"]
channels = ["robostack-humble", "conda-forge"]
name = "rarm_osc"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[package] 
name = "rarm_osc"
version = "0.1.0"

[package.build.backend]
channels = ["https://prefix.dev/conda-forge"]
name = "pixi-build-ros"
version = "*"

[package.build.config]
distro = "humble"

[tasks]

[dependencies]
python = ">=3.10.4,<3.15"
ros-humble-openarm-description = {path = "../openarm_description/package.xml"}
ros-humble-xacro = ">=2.1.1,<3"

[pypi-dependencies]
frax = ">=0.0.2, <0.0.3"
